name: Build Cyra APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o Cyra_App.zip -d extracted
          INNER=$(find extracted -maxdepth 3 -name "build.gradle" -not -path "*/app/*" | head -1 | xargs dirname)
          echo "Project at: $INNER"
          cp -r "$INNER"/. .
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant gradlew permission
        run: |
          [ -f gradlew ] || gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cyra-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
